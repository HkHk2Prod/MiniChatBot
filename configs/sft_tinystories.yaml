# SFT on top of the 29M tinystories pretrain, using alpaca-cleaned for
# real instruction tuning (~52K examples).
#
# At 29M params the model has enough capacity to actually learn from a
# real instruction corpus — the synthetic smoketest data (270 rows) is
# only useful as a pipeline test at this scale. Alpaca-cleaned hits the
# sweet spot for size: big enough to teach instruction following, small
# enough to fit comfortably in RAM and finish in <1h on an RTX 4080.
#
# The model: block mirrors pretrain_tinystories.yaml so the pretrained
# checkpoint loads cleanly.
#
# Prereqs:
#   1. A pretrain_tinystories run with a ckpt_best.pt.
#   2. The tinystories tokenizer.
#   3. Alpaca-cleaned downloaded as chat-format JSONL:
#        python scripts/data/download_sft_data.py --source alpaca_cleaned \
#            --output-dir data/alpaca
#
# Then launch:
#   python scripts/train/sft.py --config configs/sft_tinystories.yaml \
#       --from-pretrained auto --pretrain-run-name pretrain_tinystories

run_name: sft_tinystories
output_dir: runs
seed: 42
device: auto

model:
  type: transformer
  vocab_size: 8000             # match pretrain_tinystories
  max_seq_len: 512
  n_layers: 6
  n_heads: 8
  d_model: 512
  d_ff: 1408
  dropout: 0.0
  tie_embeddings: true
  norm_type: rmsnorm

tokenizer:
  type: bpe
  path: data/tinystories/tokenizer.json

data:
  type: sft
  train_path: data/alpaca/train.jsonl
  val_path: data/alpaca/val.jsonl
  seq_len: 512                 # alpaca responses can run long; match pretrain ctx
  num_workers: 0

optim:
  lr: 5.0e-5                   # smaller than pretrain (6e-4); finetuning a learned init
  weight_decay: 0.0
  betas: [0.9, 0.95]
  eps: 1.0e-8
  warmup_steps: 50
  lr_schedule: cosine
  min_lr_ratio: 0.1

trainer:
  # Alpaca-cleaned ≈ 51K train rows / batch 16 ≈ 3.2K steps/epoch. 6K steps
  # ≈ ~2 epochs — typical SFT range; longer tends to overfit a 29M model
  # on this size of corpus. Drop to ~3K for a single epoch if you want
  # something faster.
  max_steps: 6000
  batch_size: 16
  grad_accum_steps: 1
  grad_clip: 1.0
  precision: bf16
  compile: false

callbacks:
  - type: logfile
  - type: console
    params:
      every: 50
  - type: jsonl
  - type: eval
    params:
      every: 500
  - type: sample
    params:
      every: 500
      chat_template: true
      stop_on_eos: true
      prompts:
        - "Write a short poem about the sea."
        - "What is the capital of France?"
        - "Explain photosynthesis in one sentence."
      max_new_tokens: 96
  - type: checkpoint
    params:
      every: 1000
      keep_last_k: 2
