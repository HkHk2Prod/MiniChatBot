# Pretrain on FineWeb-Edu — ~110M params, real web text, ~12h on RTX 4080.
#
# The next step up from pretrain_tinystories (29M, children's stories): a
# bigger model on a much higher-signal corpus. Tinystories' SFT chat felt
# weak because the base model never saw real-world facts or general
# English; FineWeb-Edu fixes that.
#
# Position in the ladder:
#   pretrain_tinystories (23M, ~25M tokens)
#     -> pretrain_fineweb.yaml (this, 110M, ~1.3B tokens trained on 2B-token corpus)
#
# Sizing (RTX 4080 16GB):
#   ~110M params (12L, 12H, d_model=768, d_ff=2048)
#   vocab 32K — proper coverage for general English, not the 8K
#     tinystories vocab that fragments rare words
#   seq_len 1024 — captures longer contexts than tinystories' 512
#   batch 16, grad_accum 2 -> effective 32; ~12-13GB VRAM in bf16
#   40K steps × 32 × 1024 = 1.31B tokens trained — ~60% of Chinchilla
#     optimal (~2.2B for 110M), single epoch over the 2M-doc corpus
#     with no repetition. Bump max_steps to ~67K for full Chinchilla.
#
# One-time data prep (~2h download + ~15min tokenizer + ~20min pack):
#   python scripts/data/download_corpus.py --source fineweb_edu \
#       --output data/fineweb/corpus.jsonl --subset sample-10BT --max-docs 2000000
#   python scripts/data/train_tokenizer.py --corpus data/fineweb/corpus.jsonl \
#       --jsonl-key text --output data/fineweb/tokenizer.json --vocab-size 32000
#   python scripts/data/prepare_data.py --corpus data/fineweb/corpus.jsonl \
#       --jsonl-key text --tokenizer data/fineweb/tokenizer.json \
#       --output data/fineweb/ --val-frac 0.005
#
# Then launch:
#   python scripts/train/pretrain.py --config configs/pretrain_fineweb.yaml

run_name: pretrain_fineweb
output_dir: runs
seed: 42
device: auto

model:
  type: transformer
  vocab_size: 32000
  max_seq_len: 1024
  n_layers: 12
  n_heads: 12
  d_model: 768
  d_ff: 2048
  dropout: 0.0
  tie_embeddings: true
  norm_type: rmsnorm

tokenizer:
  type: bpe
  path: data/fineweb/tokenizer.json

data:
  type: pretrain
  train_path: data/fineweb/train.bin
  val_path: data/fineweb/val.bin
  seq_len: 1024
  num_workers: 4

optim:
  lr: 3.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8
  warmup_steps: 1000
  lr_schedule: cosine
  min_lr_ratio: 0.1

trainer:
  max_steps: 40000
  batch_size: 16
  grad_accum_steps: 2          # effective batch 32 — stabler grads at this scale
  grad_clip: 1.0
  precision: bf16
  compile: false               # flip on once stable for ~10-20% speedup

callbacks:
  - type: logfile
  - type: console
    params:
      every: 50
  - type: jsonl
  - type: tensorboard
  - type: checkpoint
    params:
      every: 2000
      keep_last_k: 2
  - type: eval
    params:
      every: 1000
  - type: sample
    params:
      every: 2000
      prompts:
        - "Once upon a time"
        - "The sun rose over"
        - "Scientists recently discovered that"
      max_new_tokens: 96
      # Top-p with mild penalties instead of greedy: greedy on a small
      # undertrained base model collapses into repetition loops and hides
      # how the chat REPL will actually behave. These settings match the
      # chat task defaults so mid-training samples preview real generation.
      strategy: top_p
      top_p: 0.9
      temperature: 0.8
      frequency_penalty: 0.3
      presence_penalty: 0.3
