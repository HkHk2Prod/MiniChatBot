run_name: pretrain_small
output_dir: runs
seed: 42
device: auto

model:
  type: transformer
  vocab_size: 32000
  max_seq_len: 1024
  n_layers: 6
  n_heads: 6
  d_model: 384
  d_ff: 1024
  dropout: 0.0
  tie_embeddings: true
  norm_type: rmsnorm

tokenizer:
  type: bpe
  path: tokenizer.json

data:
  train_path: data/train.bin
  val_path: data/val.bin
  seq_len: 1024
  num_workers: 4

optim:
  lr: 3.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8
  warmup_steps: 1000
  lr_schedule: cosine
  min_lr_ratio: 0.1

trainer:
  max_steps: 10000
  batch_size: 16
  grad_accum_steps: 1
  grad_clip: 1.0
  precision: bf16
  compile: false

callbacks:
  - type: logfile          # FIRST: tees stdout/stderr to {run_dir}/log.txt for everything below
  - type: console
    params:
      every: 10
  - type: jsonl
  - type: tensorboard
  - type: checkpoint
    params:
      every: 1000
      keep_last_k: 3
  - type: eval
    params:
      every: 500
  - type: sample
    params:
      every: 500
      prompts:
        - "Once upon a time"
      max_new_tokens: 64
      strategy: top_p
      p: 0.9
      temperature: 0.8
      frequency_penalty: 0.3
      presence_penalty: 0.3
